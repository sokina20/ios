name: saedny
description: "Saedny Flutter App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  
  # Networking
  http: ^1.2.2
  
  # Storage
  shared_preferences: ^2.3.2
  sqflite: ^2.3.0              # متوافق مع Dart 3.7
  path_provider: ^2.1.0        # خفضت الإصدار
  
  # Accessibility
  flutter_tts: ^4.0.2
  
  # State Management
  provider: ^6.1.2
  
  # File Handling
  image_picker: ^1.0.7
  file_picker: ^8.1.7
  http_parser: ^4.0.2
  path: ^1.9.0
  mime: ^1.0.5
  open_file: ^3.5.11
  
  # Utilities
  url_launcher: ^6.2.0         # خفضت الإصدار

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0        # متوافق مع Dart 3.7
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/splash_image.png
    - assets/images/app_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21