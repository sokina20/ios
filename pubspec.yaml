name: saedny
description: "Saedny Flutter App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.3.2
  flutter_tts: ^4.0.2
  provider: ^6.1.2
  image_picker: ^1.0.7
  file_picker: ^8.1.7
  http_parser: ^4.0.2
  path: ^1.9.0
  mime: ^1.0.5
  url_launcher: ^6.3.0
  path_provider: ^2.1.5
  open_file: ^3.5.11
  sqflite: ^2.4.2+1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/splash_image.png
    - assets/images/app_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21